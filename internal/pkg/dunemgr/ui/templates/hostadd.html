{{define "title"}}dunemgr — add host{{end}}
{{define "body"}}
<h1>Add host</h1>
{{if .Error}}<p class="muted" role="alert">{{.Error}}</p>{{end}}
<form method="post" action="/hosts/add">
  <label>Name
    <input name="name" value="{{.Name}}" required autofocus>
  </label>
  <label>SSH alias <small class="muted">(optional; defaults to the name)</small>
    <input name="ssh_alias" value="{{.SSHAlias}}">
  </label>
  <button type="submit">Add</button>
</form>
<p><a href="/">← hosts</a></p>
{{end}}
