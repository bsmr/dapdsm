{{/* backups.html */}}
{{define "backups"}}
<section aria-labelledby="backups-h">
  <h3 id="backups-h">Backups — {{.Host}}/{{.BG}}</h3>

  <form hx-post="/host/{{.Host}}/backups"
        hx-target="#backups-list"
        hx-swap="outerHTML">
    <input type="hidden" name="bg" value="{{.BG}}">
    <fieldset role="group">
      <input type="text" name="name" placeholder="backup name (alnum, _ . -)" required pattern="[A-Za-z0-9][A-Za-z0-9_.-]{0,63}">
      <button type="submit">create</button>
    </fieldset>
  </form>

  <div id="backups-list">
  {{if .Backups}}
    <table>
      <thead>
        <tr><th>created</th><th>name</th><th>size</th><th>actions</th></tr>
      </thead>
      <tbody>
      {{range .Backups}}
        <tr>
          <td>{{.CreatedAt.Format "2006-01-02 15:04Z"}}</td>
          <td>{{.Name}}</td>
          <td>{{.Bytes}} B</td>
          <td>
            <form hx-post="/host/{{$.Host}}/backups/restore"
                  hx-confirm="Restore overwrites BG data. Continue?"
                  hx-target="#backups-result"
                  hx-swap="innerHTML">
              <input type="hidden" name="key" value="{{.Key}}">
              <input type="hidden" name="confirm" value="yes">
              <button type="submit" class="contrast">restore</button>
            </form>
          </td>
        </tr>
      {{end}}
      </tbody>
    </table>
  {{else}}
    <p><em>(no backups for {{.Host}}/{{.BG}})</em></p>
  {{end}}
  </div>

  <output id="backups-result"></output>
</section>
{{end}}
