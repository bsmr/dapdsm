{{/* internal/pkg/dunemgr/ui/templates/db_columns.html */}}
{{define "db_columns"}}
<section aria-labelledby="dbcols-h">
  <h4 id="dbcols-h">Columns — <code>{{.Schema}}.{{.Table}}</code></h4>
  {{if .Columns}}
    <table>
      <thead><tr><th>column</th><th>type</th></tr></thead>
      <tbody>
      {{range .Columns}}
        <tr><td><code>{{.Name}}</code></td><td>{{.Type}}</td></tr>
      {{end}}
      </tbody>
    </table>
  {{else}}
    <p><em>(no columns)</em></p>
  {{end}}
</section>
{{end}}
