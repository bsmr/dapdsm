{{define "title"}}dunemgr — login{{end}}
{{define "body"}}
<article>
  <h1>dunemgr</h1>
  <p class="muted">Paste your token (printed by <code>dunemgr</code> on start).</p>
  <form method="post" action="/login">
    <input name="token" type="password" required autofocus>
    <button type="submit">Login</button>
  </form>
</article>
{{end}}
